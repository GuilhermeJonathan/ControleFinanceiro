name: Deploy – ControleFinanceiro API

on:
  push:
    branches: [main]
    paths:
      - "ControleFinanceiro.Api/**"
      - "ControleFinanceiro.Application/**"
      - "ControleFinanceiro.Infrastructure/**"
      - "ControleFinanceiro.Domain/**"
      - "Dockerfile.api"
      - ".github/workflows/deploy-api.yml"

jobs:
  build-and-deploy:
    name: Build & Deploy para Render
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ControleFinanceiro.Api/ControleFinanceiro.Api.csproj

      - name: Build
        run: >
          dotnet build ControleFinanceiro.Api/ControleFinanceiro.Api.csproj
          -c Release --no-restore

      # O Render detecta o push no GitHub e faz o deploy automaticamente.
      # Não é necessário disparar via webhook.
