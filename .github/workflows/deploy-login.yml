name: Deploy – Login API

on:
  push:
    branches: [main]
    paths:
      - "Login/**"
      - "Dockerfile.login"
      - ".github/workflows/deploy-login.yml"

jobs:
  build-and-deploy:
    name: Build & Deploy para Render
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Login/Login/Login.csproj

      - name: Build
        run: dotnet build Login/Login/Login.csproj -c Release --no-restore

      # O Render detecta o push no GitHub e faz o deploy automaticamente.
