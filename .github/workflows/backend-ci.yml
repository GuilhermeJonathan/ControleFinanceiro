name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.slnx'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.slnx'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ── Main API ──────────────────────────────────────────
      - name: Restore Main API
        run: dotnet restore ControleFinanceiro.slnx

      - name: Build Main API
        run: dotnet build ControleFinanceiro.slnx --no-restore -c Release

      - name: Test Main API
        run: dotnet test ControleFinanceiro.slnx --no-build -c Release --verbosity minimal

      # ── Login API ─────────────────────────────────────────
      - name: Restore Login API
        run: dotnet restore Login/Login.slnx

      - name: Build Login API
        run: dotnet build Login/Login.slnx --no-restore -c Release

      - name: Test Login API
        run: dotnet test Login/Login.slnx --no-build -c Release --verbosity minimal

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy Main API
        if: env.RENDER_DEPLOY_MAIN != ''
        run: curl -s -X POST "${{ secrets.RENDER_DEPLOY_MAIN }}"
        env:
          RENDER_DEPLOY_MAIN: ${{ secrets.RENDER_DEPLOY_MAIN }}

      - name: Deploy Login API
        if: env.RENDER_DEPLOY_LOGIN != ''
        run: curl -s -X POST "${{ secrets.RENDER_DEPLOY_LOGIN }}"
        env:
          RENDER_DEPLOY_LOGIN: ${{ secrets.RENDER_DEPLOY_LOGIN }}
